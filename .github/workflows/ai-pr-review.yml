# Drop this file into any project repo as:
#   .github/workflows/ai-pr-review.yml
#
# Required repo secret: OPENROUTER_API_KEY  (your OpenRouter API key)
# Optional repo secret: GH_PAT  (PAT with repo scope — needed if PRs are
#   created by an automated agent so that this review can trigger further workflows)
#
# To suppress auto-merge on a specific PR, add the "needs-human-review" label.

name: AI PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  review:
    uses: mikekyle/py_projects/.github/workflows/pr-review.yml@master
    with:
      auto_merge: false
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets: inherit
